services:
  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=$TZ
    volumes:
      - ./config:/config
    #network_mode: host
    networks:
      default:
    #    interface_name: enp1s0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 2m
    labels:
      # - autoheal=true
      - "diun.enable=true"

networks:
  default:
#    driver: bridge
    enable_ipv6: true
#    ipam:
#      driver: default
#      config:
#        - subnet: fd00::/64
