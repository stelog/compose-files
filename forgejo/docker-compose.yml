networks:
  forgejo:
    external: false

services:
  server:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: 1
    environment:
      - USER_UID=$USER_UID
      - USER_GID=$USER_GID
    networks:
      - forgejo
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3000:3000'
      - '222:22'
    restart: 'unless-stopped'
