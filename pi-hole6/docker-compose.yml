# More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
services:
  pihole:
    container_name: pihole6
    image: pihole/pihole:latest
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1"
    networks:
     - ipv6net
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8083:80/tcp"
      - "8445:443/tcp"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: $TZ
      # Set a password to access the web interface. Not setting one will result in a random password being assigned
      FTLCONF_webserver_api_password: ${ADMIN_PASSWORD}
      # If using Docker's default `bridge` network setting the dns listening mode should be set to 'all'
      FTLCONF_dns_listeningMode: 'ALL'
      #FTLCONF_ntp_ipv4_active: 'false'
      #FTLCONF_ntp_ipv6_active: 'false'
    hostname: pihole
    # Volumes store your data between container upgrades
    volumes:
      - './etc-pihole:/etc/pihole'
      # Uncomment the below if you have custom dnsmasq config files that you want to persist. Not needed for most
      # starting fresh with Pi-hole v6. If you're upgrading from v5 you and have used this directory before,
      # you should keep it enabled for the first v6 container start to allow for a complete migration. It can be
      # removed afterwards. Needs environment variable FTLCONF_misc_etc_dnsmasq_d: 'true'
      # - './etc-dnsmasq.d:/etc/dnsmasq.d'
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    restart: always
    cap_add:
      # Required if you are using Pi-hole as your DHCP server, else not needed
      - NET_ADMIN
      # - CAP_NET_RAW
      # - CAP_NET_BIND_SERVICE
      # - CAP_CHOWN
      # Required if you are using Pi-hole as your NTP client to be able to set the host's system time
      # - SYS_TIME
      # Optional, if Pi-hole should get some more processing time
      - SYS_NICE
    labels:
      - autoheal=true
networks:
 ipv6net:
   enable_ipv6: true
